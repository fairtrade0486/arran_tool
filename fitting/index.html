<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AARAN — AI Virtual Fitting</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"><style>:root{--black:#0a0a0a;--white:#f5f2ee;--gold:#c9a96e;--gold-light:#e8d5b0;--gray:#8a8680;--border:rgba(201,169,110,0.25)}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--black);color:var(--white);font-family:'DM Mono',monospace;min-height:100vh}header{padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;letter-spacing:0.3em;color:var(--gold)}.logo span{font-style:italic;color:var(--white);font-size:0.65rem;letter-spacing:0.2em;display:block;font-family:'DM Mono',monospace}.header-tag{font-size:0.6rem;letter-spacing:0.2em;color:var(--gray)}main{max-width:700px;margin:0 auto;padding:3rem 1.5rem}.hero{text-align:center;margin-bottom:3rem}.hero-label{font-size:0.6rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;display:block}h1{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;line-height:1.1;margin-bottom:1rem}h1 em{font-style:italic;color:var(--gold)}.hero-sub{font-size:0.65rem;letter-spacing:0.1em;color:var(--gray);line-height:2}.section{margin-bottom:1.5rem}.section-label{font-size:0.6rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.6rem;display:block}.upload-btn{width:100%;padding:1.2rem;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--white);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;cursor:pointer;text-align:left;transition:all 0.3s;display:flex;align-items:center;gap:1rem}.upload-btn:hover{border-color:var(--gold)}.upload-btn.has-file{border-color:var(--gold);background:rgba(201,169,110,0.05)}.preview-img{width:100%;max-height:200px;object-fit:cover;margin-top:0.5rem;border:1px solid var(--border);display:none}.api-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--white);font-family:'DM Mono',monospace;font-size:0.7rem;padding:1rem;outline:none;transition:border-color 0.3s}.api-input:focus{border-color:var(--gold)}.api-input::placeholder{color:var(--gray);opacity:0.5}.mode-tabs{display:flex;border:1px solid var(--border);overflow:hidden}.mode-tab{flex:1;padding:0.8rem 0.5rem;background:transparent;border:none;color:var(--gray);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;text-transform:uppercase;border-right:1px solid var(--border)}.mode-tab:last-child{border-right:none}.mode-tab.active{background:rgba(201,169,110,0.12);color:var(--gold)}.generate-btn{width:100%;padding:1.2rem;background:var(--gold);border:none;color:var(--black);font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:0.5rem}.generate-btn:disabled{opacity:0.4;cursor:not-allowed}.status-msg{margin-top:1rem;padding:1rem;border:1px solid var(--border);font-size:0.62rem;letter-spacing:0.08em;color:var(--gray);display:none;line-height:1.8}.status-msg.visible{display:block}.status-msg.error{border-color:#c96e6e;color:#c96e6e}.status-msg.success{border-color:var(--gold);color:var(--gold-light)}.result-section{margin-top:3rem;display:none}.result-section.visible{display:block}.result-divider{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}.result-divider::before,.result-divider::after{content:'';flex:1;height:1px;background:var(--border)}.result-divider span{font-size:0.6rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase}.result-card{border:1px solid var(--border);margin-bottom:1.5rem;overflow:hidden}.result-card-header{padding:0.8rem 1rem;border-bottom:1px solid var(--border)}.result-card-title{font-size:0.6rem;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase}.result-card-body{padding:1rem;min-height:200px;display:flex;align-items:center;justify-content:center}.result-img,.result-video{width:100%;object-fit:cover}.loading-state{display:flex;flex-direction:column;align-items:center;gap:1rem}.loading-dots{display:flex;gap:6px}.loading-dots span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.4s ease infinite}.loading-dots span:nth-child(2){animation-delay:0.2s}.loading-dots span:nth-child(3){animation-delay:0.4s}.loading-text{font-size:0.6rem;letter-spacing:0.15em;color:var(--gray);text-transform:uppercase}.download-btn{display:inline-block;margin-top:0.8rem;padding:0.5rem 1rem;background:transparent;border:1px solid var(--border);color:var(--gray);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-decoration:none;text-transform:uppercase}.download-btn:hover{border-color:var(--gold);color:var(--gold)}@keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}</style></head><body><header><div class="logo">AARAN<span>AI Virtual Fitting</span></div><div class="header-tag">Powered by Kling AI</div></header><main><div class="hero"><span class="hero-label">Virtual Try-On Studio</span><h1>Wear it before<br>you <em>own it</em></h1><p class="hero-sub">Upload your photo & garment<br>AI generates fitting image and video</p></div><div class="section"><span class="section-label">① Your Photo</span><label style="display:block;cursor:pointer"><div class="upload-btn" id="modelBtn">👤 <span id="modelBtnText">Tap to upload your photo</span></div><input type="file" accept="image/*" style="display:none" onchange="handleUpload(this,'model')"></label><img class="preview-img" id="modelPreview"></div><div class="section"><span class="section-label">② Garment Photo</span><label style="display:block;cursor:pointer"><div class="upload-btn" id="garmentBtn">👗 <span id="garmentBtnText">Tap to upload garment photo</span></div><input type="file" accept="image/*" style="display:none" onchange="handleUpload(this,'garment')"></label><img class="preview-img" id="garmentPreview"></div><div class="section"><span class="section-label">③ PiAPI Key</span><input type="password" class="api-input" id="apiKey" placeholder="Paste your PiAPI key here..."></div><div class="section"><span class="section-label">④ Output Mode</span><div class="mode-tabs"><button class="mode-tab active" onclick="setMode('image')">Image Only</button><button class="mode-tab" onclick="setMode('video')">Video Only</button><button class="mode-tab" onclick="setMode('both')">Image + Video</button></div></div><button class="generate-btn" id="generateBtn" onclick="generate()">✦ Generate AI Fitting</button><div class="status-msg" id="statusMsg"></div><div class="result-section" id="resultSection"><div class="result-divider"><span>Results</span></div><div id="resultGrid"></div></div></main><script>let modelFile=null,garmentFile=null,currentMode='image';function setMode(mode){currentMode=mode;document.querySelectorAll('.mode-tab').forEach((t,i)=>{t.classList.toggle('active',['image','video','both'][i]===mode)})}function handleUpload(input,type){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{if(type==='model'){modelFile=file;document.getElementById('modelPreview').src=e.target.result;document.getElementById('modelPreview').style.display='block';document.getElementById('modelBtn').classList.add('has-file');document.getElementById('modelBtnText').textContent='✓ Photo selected: '+file.name}else{garmentFile=file;document.getElementById('garmentPreview').src=e.target.result;document.getElementById('garmentPreview').style.display='block';document.getElementById('garmentBtn').classList.add('has-file');document.getElementById('garmentBtnText').textContent='✓ Garment selected: '+file.name}};reader.readAsDataURL(file)}function showStatus(msg,type=''){const el=document.getElementById('statusMsg');el.textContent=msg;el.className='status-msg visible'+(type?' '+type:'')}function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})}async function callTryOn(apiKey,modelB64,garmentB64,mimeType){const response=await fetch('https://api.piapi.ai/api/kling/v1/images/kolors-virtual-try-on',{method:'POST',headers:{'X-API-Key':apiKey,'Content-Type':'application/json'},body:JSON.stringify({model_image:'data:'+mimeType+';base64,'+modelB64,dress_image:'data:'+mimeType+';base64,'+garmentB64,n:1})});const data=await response.json();if(data.code!==200)throw new Error(data.message||'Try-on API error: '+JSON.stringify(data));return data.data?.task_id}async function callVideo(apiKey,imageUrl){const response=await fetch('https://api.piapi.ai/api/kling/v1/videos/image2video',{method:'POST',headers:{'X-API-Key':apiKey,'Content-Type':'application/json'},body:JSON.stringify({model_name:'kling-v1',image:imageUrl,prompt:'fashion model wearing outfit, natural gentle movement, editorial style',duration:5,mode:'std',cfg_scale:0.5})});const data=await response.json();if(data.code!==200)throw new Error(data.message||'Video API error');return data.data?.task_id}async function pollTask(apiKey,taskId,type){const url=type==='image'?'https://api.piapi.ai/api/kling/v1/images/kolors-virtual-try-on/'+taskId:'https://api.piapi.ai/api/kling/v1/videos/image2video/'+taskId;for(let i=0;i<60;i++){await new Promise(r=>setTimeout(r,5000));const res=await fetch(url,{headers:{'X-API-Key':apiKey}});const data=await res.json();const status=data.data?.task_status;if(status==='succeed')return type==='image'?data.data?.task_result?.images?.[0]?.url:data.data?.task_result?.videos?.[0]?.url;if(status==='failed')throw new Error('Task failed: '+(data.data?.task_status_msg||''))}throw new Error('Timeout')}function addCard(title,id){const grid=document.getElementById('resultGrid');const card=document.createElement('div');card.className='result-card';card.id=id;card.innerHTML='<div class="result-card-header"><span class="result-card-title">'+title+'</span></div><div class="result-card-body"><div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div class="loading-text">Generating...</div></div></div>';grid.appendChild(card)}function updateCard(id,html){const c=document.getElementById(id);if(c)c.querySelector('.result-card-body').innerHTML=html}async function generate(){const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey)return showStatus('Please enter your PiAPI key.','error');if(!modelFile)return showStatus('Please upload your photo.','error');if(!garmentFile)return showStatus('Please upload the garment photo.','error');const btn=document.getElementById('generateBtn');btn.disabled=true;document.getElementById('resultGrid').innerHTML='';document.getElementById('resultSection').classList.add('visible');try{showStatus('⟳ Preparing images...','');const mimeType=modelFile.type||'image/jpeg';const modelB64=await toBase64(modelFile);const garmentB64=await toBase64(garmentFile);showStatus('⟳ Sending to Kling AI...','');addCard('Fitting Image','imgCard');const tryOnId=await callTryOn(apiKey,modelB64,garmentB64,mimeType);showStatus('⟳ Generating fitting image... (30-60 sec)','');const imgUrl=await pollTask(apiKey,tryOnId,'image');updateCard('imgCard','<div style="width:100%"><img class="result-img" src="'+imgUrl+'"><div style="padding:0.8rem"><a class="download-btn" href="'+imgUrl+'" target="_blank">Download Image ↓</a></div></div>');if(currentMode==='video'||currentMode==='both'){showStatus('⟳ Generating video...','');addCard('Fitting Video','vidCard');const vidId=await callVideo(apiKey,imgUrl);showStatus('⟳ Generating fitting video... (1-2 min)','');const vidUrl=await pollTask(apiKey,vidId,'video');updateCard('vidCard','<div style="width:100%"><video class="result-video" src="'+vidUrl+'" controls autoplay loop muted></video><div style="padding:0.8rem"><a class="download-btn" href="'+vidUrl+'" target="_blank">Download Video ↓</a></div></div>')}showStatus('✓ Done! Your AI fitting is ready.','success')}catch(err){showStatus('✕ '+err.message,'error')}finally{btn.disabled=false}}</script></body></html>
